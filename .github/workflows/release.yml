name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.1.0-preview)'
        required: true
        default: 'v0.1.0-preview'
      notes:
        description: 'Release notes'
        required: false
        default: 'Preview build for testing.'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version }}
          releaseName: 'Handheld RPG ${{ github.event.inputs.version }}'
          releaseBody: ${{ github.event.inputs.notes }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

  attach-readme:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Upload README to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.version }} README.txt \
            --repo ${{ github.repository }} \
            --clobber
